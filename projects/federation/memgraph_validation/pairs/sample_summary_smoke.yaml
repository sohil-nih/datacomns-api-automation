# Lighter check when subject graph schema differs — Memgraph has data + API returns summary.
id: sample_summary_memgraph_smoke
description: Memgraph has at least one node; API sample summary returns JSON list/dict.
tags:
  - memgraph_api
  - regression

cypher: |
  MATCH (n)
  RETURN 1 AS ok
  LIMIT 1

cypher_parameters: {}

api:
  method: GET
  path: /sample/summary
  query: {}

comparison:
  type: graph_min_rows_and_api_json_nonempty
  min_graph_rows: 1
