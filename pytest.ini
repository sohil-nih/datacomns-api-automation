[pytest]
testpaths =
    projects
pythonpath = .
python_files = test_*.py test-*.py *_test.py
# -s: show DATACOMNS_PRINT API/Memgraph output (pytest does not run pytest_load_initial_conftests from conftest)
addopts =
    -ra
    --strict-markers
    -q
    -s
filterwarnings =
    ignore::DeprecationWarning

markers =
    smoke: fast checks; run on every commit or deploy gate
    regression: broader API coverage; run nightly or pre-release
    contract: OpenAPI/schema-driven checks
    ai_assisted: tests that call or depend on AI tooling (opt-in)
    project_federation: Federation Service API project
    memgraph_api: Memgraph Cypher + REST cross-validation pair
    project_dcc: CCDI Data Commons (DCC) API project
